<!DOCTYPE html>
<html>
<body>
    <form id="regForm">
        <input type="text" id="nickname" placeholder="მეტსახელი">
        <select id="gender">
            <option value="მამრობითი">მამრობითი</option>
            <option value="მდედრობითი">მდედრობითი</option>
        </select>
        <button type="submit">რეგისტრაცია</button>
    </form>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('fire_nickname', document.getElementById('nickname').value);
            localStorage.setItem('fire_gender', document.getElementById('gender').value);
            window.location.href = 'main.html';
        });
    </script>
</body>
</html>
