<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE - კედელი</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ზედა ზოლი (Navbar) */
        .top-navbar {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .top-navbar .logo {
            font-size: 22px;
            font-weight: bold;
            color: #ff4757;
            text-decoration: none;
        }

        .user-greeting {
            font-weight: 600;
            color: #2f3542;
        }

        /* მთავარი სამუშაო სივრცე (Layout) */
        .main-container {
            display: flex;
            margin-top: 55px;
            height: calc(100vh - 55px);
            overflow: hidden;
        }

        /* 1. მარცხენა მენიუ (Sidebar) */
        .sidebar {
            width: 250px;
            background-color: #fff;
            border-right: 1px solid #e4e6eb;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #1c1e21;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            background-color: #f2f3f5;
        }

        .sidebar-item.active {
            background-color: #ffeef0;
            color: #ff4757;
        }

        /* 2. შუა ნაწილი - კედელი (Feed) */
        .feed-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* პოსტის დასაწერი ყუთი */
        .create-post {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            padding: 15px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        .create-post textarea {
            width: 100%;
            height: 70px;
            border: 1px solid #ced6e0;
            border-radius: 8px;
            padding: 10px;
            resize: none;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .create-post button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .create-post button:hover {
            background-color: #e84118;
        }

        /* პოსტის ვიზუალი კედელზე */
        .post-card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            padding: 15px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            background-color: #ff6b81;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .post-author {
            font-weight: bold;
            color: #2f3542;
        }

        .post-time {
            font-size: 12px;
            color: #747d8c;
        }

        .post-content {
            font-size: 15px;
            line-height: 1.5;
            color: #1c1e21;
            word-wrap: break-word;
        }

        /* 3. მარჯვენა ბლოკი (Widgets/წევრები) */
        .right-sidebar {
            width: 280px;
            background-color: #fff;
            border-left: 1px solid #e4e6eb;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .right-sidebar { display: none; }
        }

        .widget-title {
            font-size: 16px;
            font-weight: bold;
            color: #747d8c;
            margin-bottom: 10px;
            border-bottom: 1px solid #f1f2f6;
            padding-bottom: 5px;
        }

        .online-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background-color: #2ed573;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <a href="#" class="logo">FIRE-</a>
        <div class="user-greeting" id="userGreeting">გამარჯობა, სტუმარო!</div>
    </div>

    <div class="main-container">

        <div class="sidebar">
            <a href="#" class="sidebar-item active">🏠 ჩემი კედელი</a>
            <a href="#" class="sidebar-item">👤 ჩემი პროფილი</a>
            <a href="#" class="sidebar-item">👥 ჩემი მეგობრები</a>
            <a href="#" class="sidebar-item">💬 ჩემი ჩათები</a>
            <a href="#" class="sidebar-item">🖼️ ჩემი სურათები</a>
            <a href="#" class="sidebar-item">📊 გამოკითხვები</a>
            <a href="#" class="sidebar-item">🎮 თამაშები</a>
        </div>

        <div class="feed-container">
            
            <div class="create-post">
                <textarea id="postInput" placeholder="რაზე ფიქრობთ ახლა?"></textarea>
                <button onclick="addPost()">გამოქვეყნება</button>
            </div>

            <div id="postsFeed" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;">
                
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">ან</div>
                        <div>
                            <div class="post-author">ანი</div>
                            <div class="post-time">10 წუთის წინ</div>
                        </div>
                    </div>
                    <div class="post-content">მოგესალმებით ყველას ახალ პლატფორმაზე! 🔥 იმედია ბევრ მეგობარს შევიძენ აქ.</div>
                </div>

            </div>

        </div>

        <div class="right-sidebar">
            <div>
                <div class="widget-title">ონლაინ წევრები (3)</div>
                <div class="online-user"><div class="online-dot"></div> გიორგი</div>
                <div class="online-user"><div class="online-dot"></div> ანი</div>
                <div class="online-user"><div class="online-dot"></div> ლუკა</div>
            </div>
        </div>

    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedNickname = localStorage.getItem('fire_nickname');
            if (savedNickname) {
                document.getElementById('userGreeting').innerText = 'გამარჯობა, ' + savedNickname + '!';
            }
        });

        function addPost() {
            const postInput = document.getElementById('postInput');
            const postText = postInput.value.trim();
            
            if (postText === "") {
                alert("გთხოვთ ჩაწეროთ ტექსტი!");
                return;
            }

            const savedNickname = localStorage.getItem('fire_nickname') || 'მომხმარებელი';
            const initials = savedNickname.substring(0, 2);
            const feed = document.getElementById('postsFeed');

            const newPost = document.createElement('div');
            newPost.className = 'post-card';
            newPost.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar">${initials}</div>
                    <div>
                        <div class="post-author">${savedNickname}</div>
                        <div class="post-time">ახლახან</div>
                    </div>
                </div>
                <div class="post-content">${postText}</div>
            `;

            feed.insertBefore(newPost, feed.firstChild);
            postInput.value = "";
        }
    </script>

</body>
</html>
